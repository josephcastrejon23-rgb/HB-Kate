<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD Kate! 💜</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --army-purple: #bb86fc; 
            --dark-purple: #1a0033; 
            --bts-gradient: linear-gradient(135deg, #120024 0%, #000000 100%);
        }
        
        body { 
            margin: 0; 
            background: #000; 
            color: white; 
            font-family: 'Montserrat', sans-serif; 
            text-align: center; 
            overflow-x: hidden; 
        }

        .bg-kate { 
            position: fixed; 
            inset: 0; 
            background: var(--bts-gradient); 
            z-index: -1; 
        }
        
        #bloqueo-inicial { 
            position: fixed; inset: 0; background: #000; z-index: 50000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }

        #intro-k { 
            position: fixed; inset: 0; background: #000; z-index: 1000; 
            display: none; align-items: center; justify-content: center; 
        }
        
        #text-k {
            transition: opacity 0.6s ease-in-out;
            opacity: 0;
            text-shadow: 0 0 15px var(--army-purple);
        }

        .container { 
            padding: 60px 20px; 
            display: none; 
            opacity: 0; 
            transition: opacity 2s ease-in; 
            max-width: 1100px;
            margin: auto;
        }
        
        /* TÍTULOS REFINADOS */
        .header-section { margin-bottom: 50px; }
        h1.main-title { font-family: 'Syncopate'; font-size: 3.5rem; margin: 0; letter-spacing: 10px; }
        .age-badge { color: var(--army-purple); letter-spacing: 5px; font-weight: 300; margin-top: 10px; }

        /* MURAL ESTILO REJILLA MODERNA */
        .mural-k { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            grid-auto-rows: 350px;
            gap: 20px; 
            margin: 40px auto; 
        }
        
        /* Variación de tamaños para dinamismo */
        .mural-k div:nth-child(2n) { grid-row: span 1.5; }
        .mural-k div:nth-child(3n) { grid-column: span 1; grid-row: span 1.2; }

        .mural-k div { 
            border-radius: 15px; 
            overflow: hidden; 
            border: 1px solid rgba(187, 134, 252, 0.2);
            transition: all 0.5s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .mural-k img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block;
            filter: brightness(0.8);
            transition: 0.5s;
        }

        .mural-k div:hover { 
            transform: scale(1.02);
            border-color: var(--army-purple);
            box-shadow: 0 0 20px rgba(187, 134, 252, 0.3);
        }
        .mural-k div:hover img { filter: brightness(1.1); }

        .message-box { 
            background: rgba(255, 255, 255, 0.05); 
            padding: 35px; 
            border-radius: 25px; 
            border-left: 4px solid var(--army-purple);
            max-width: 700px; 
            margin: 0 auto 50px;
            backdrop-filter: blur(10px);
            text-align: left;
            line-height: 1.8;
        }

        .btn-k { 
            background: transparent; 
            color: var(--army-purple); 
            border: 2px solid var(--army-purple); 
            padding: 15px 40px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold;
            transition: 0.3s;
            font-family: 'Syncopate', sans-serif;
            font-size: 0.8rem;
        }
        .btn-k:hover { background: var(--army-purple); color: black; box-shadow: 0 0 25px var(--army-purple); }

    </style>
</head>
<body>

    <div class="bg-kate"></div>

    <div id="bloqueo-inicial">
        <h2 style="color: var(--army-purple); font-family: 'Syncopate'; margin-bottom: 25px;">BTS CHAPTER: KATE</h2>
        <button class="btn-k" onclick="iniciarExperiencia()">INICIO :3</button>
    </div>

    <audio id="audioBTS" loop preload="auto">
        <source src="Happy Birthday To You - THE KIBOOMERS Birthday Party Song for Kids (1).mp3" type="audio/mpeg">
    </audio>

    <div id="intro-k">
        <h1 id="text-k" style="color:var(--army-purple); font-size: 2.2rem; font-family: 'Syncopate';"></h1>
    </div>

    <div class="container" id="main-k">
        
        <div class="header-section">
            <h1 class="main-title">KATE</h1>
            <p class="age-badge">CHAPTER 20</p>
        </div>
        
        <div class="message-box">
            <p>¡Feliiiz cumpleee Kateee! 🎂, que la pases muy bonitooo, felices 20 añitos. Sigue con esa chispa que te caracteriza, eres una muy buena amiga y te mereces todo lo mejor hoy y siempre, cuñis! 💜</p>
        </div>

        <div class="mural-k">
            <div><img src="WhatsApp Image 2026-04-29 at 11.21.13 AM (2).jpeg"></div>
            <div><img src="WhatsApp Image 2026-04-29 at 11.21.11 AM (1).jpeg"></div>
            <div><img src="WhatsApp Image 2026-04-29 at 11.21.11 AM.jpeg"></div>
            <div><img src="WhatsApp Image 2026-04-29 at 11.21.13 AM (1).jpeg"></div>
            <div><img src="WhatsApp Image 2026-04-29 at 11.21.15 AM.jpeg"></div>
        </div>

        <div style="margin: 80px 0;">
            <button class="btn-k" onclick="boom()">LANZAR DINAMITA 🧨</button>
        </div>

        <footer style="padding-bottom: 50px;">
            <a href="ambas.html" style="color:var(--army-purple); text-decoration:none; font-size: 0.9rem; letter-spacing: 2px;">VER MURAL COMPARTIDO 👯‍♀️</a>
        </footer>
    </div>

    <script>
        const audio = document.getElementById('audioBTS');
        const intro = document.getElementById('intro-k');
        const main = document.getElementById('main-k');
        const txt = document.getElementById('text-k');

        const frases = [
            "¡Atención ARMY! 💜",
            "Hoy celebramos a una leyenda...",
            "¡Feliz Cumpleaños Kate!",
            "Pásala muy bonito cuñis"
        ];

        function iniciarExperiencia() {
            document.getElementById('bloqueo-inicial').style.display = 'none';
            intro.style.display = 'flex';
            audio.play();
            mostrarFrases(0);
        }

        function mostrarFrases(index) {
            if (index < frases.length) {
                txt.innerText = frases[index];
                txt.style.opacity = 1;
                setTimeout(() => {
                    txt.style.opacity = 0;
                    setTimeout(() => mostrarFrases(index + 1), 600);
                }, 2000);
            } else {
                intro.style.opacity = 0;
                setTimeout(() => {
                    intro.style.display = 'none';
                    main.style.display = 'block';
                    setTimeout(() => main.style.opacity = 1, 100);
                }, 1000);
            }
        }

        function boom() {
            confetti({
                particleCount: 150,
                spread: 80,
                origin: { y: 0.6 },
                colors: ['#bb86fc', '#ffffff', '#240046']
            });
        }
    </script>
</body>
</html>
