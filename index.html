<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>HBD Kate! ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; background: #0f0c29; color: white;
            font-family: 'Poppins', sans-serif; display: flex;
            justify-content: center; align-items: center; min-height: 100vh;
            text-align: center; overflow: hidden;
        }
        .neon-box {
            padding: 50px; border: 4px solid #9d4edd;
            box-shadow: 0 0 20px #9d4edd, inset 0 0 20px #9d4edd;
            border-radius: 20px; background: rgba(0,0,0,0.5);
        }
        h1 { font-size: 4rem; text-transform: uppercase; letter-spacing: 5px; color: #fff; }
        .gift { font-size: 5rem; animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .btn-link {
            margin-top: 30px; display: inline-block;
            color: #9d4edd; text-decoration: none; border: 1px solid #9d4edd;
            padding: 10px 20px; border-radius: 10px; transition: 0.3s;
        }
        .btn-link:hover { background: #9d4edd; color: white; }
    </style>
</head>
<body>
    <div class="neon-box">
        <div class="gift">🎁</div>
        <h1>¡Feliz Cumpleaños Kate!</h1>
        <p>¡Pásala increíble, cuñis! Que este año sea el mejor de todos.</p>
        <a href="mellizas.html" class="btn-link">Ver saludo para Zarelly y para ti 👯‍♀️</a>
    </div>
</body>
</html>
