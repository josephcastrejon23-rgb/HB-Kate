<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>HBD Kate! 💜</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Poppins', sans-serif; text-align: center; }
        #intro-kate { position: fixed; inset:0; background: #1a1a1a; z-index: 1000; display:flex; align-items:center; justify-content:center; }
        .txt-kate { display:none; font-size: 3rem; color: #bb86fc; text-shadow: 0 0 10px #bb86fc; }
        #main-kate { display: none; background: #0a0a0a; padding: 20px; }
        .bts-card { border: 2px solid #bb86fc; padding: 20px; border-radius: 15px; background: rgba(187, 134, 252, 0.1); margin: 20px; }
    </style>
</head>
<body>
    <audio id="kateMusic" loop><source src="LINK_DE_BTS_AQUÍ.mp3"></audio>

    <div id="intro-kate">
        <div class="txt-kate" id="k1">¡Atención ARMY! 💜</div>
        <div class="txt-kate" id="k2">Hoy una reina cumple años...</div>
        <div class="txt-kate" id="k3">¡Feliz Cumple Kate! 🎂</div>
        <div class="txt-kate" id="k4"><button onclick="startKate()" style="padding:15px; background:#bb86fc; border:none; cursor:pointer;">VER REGALO 🎁</button></div>
    </div>

    <div id="main-kate">
        <h1 style="color:#bb86fc">HAPPY BIRTHDAY KATE 👑</h1>
        <div class="bts-card">
            <h3>Para mi Cuñis favorita:</h3>
            <p>Kate, que este año sea "Dynamite" y que sigas brillando como los chicos de BTS. ¡Pásala increíble!</p>
        </div>

        <div class="grid-fotos" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <img src="kate1.jpg" style="width:100%">
            <img src="kate2.jpg" style="width:100%">
        </div>

        <h3>Minijuegos para Kate 🕹️</h3>
        <button onclick="alert('BTS Quiz: ¿Quién es el líder?')">BTS Trivia</button>
        <button onclick="alert('¡Confeti virtual lanzado!')">Lanzar Confeti</button>
        
        <br><br><a href="ambas.html" style="color:#bb86fc">Saludo para las dos 👯‍♀️</a>
    </div>

    <script>
        let kStep = 1;
        function stepsKate() {
            if(kStep > 1) document.getElementById('k'+(kStep-1)).style.display = 'none';
            document.getElementById('k'+kStep).style.display = 'block';
            if(kStep < 4) { kStep++; setTimeout(stepsKate, 2000); }
        }
        window.onload = stepsKate;
        function startKate() {
            document.getElementById('kateMusic').play();
            document.getElementById('intro-kate').style.display = 'none';
            document.getElementById('main-kate').style.display = 'block';
        }
    </script>
</body>
</html>
