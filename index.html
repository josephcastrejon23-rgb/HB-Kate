<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Cumple Kate! ✨</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #d4a5ff; 
            --secondary: #9d81ff;
            --glass: rgba(255, 255, 255, 0.15);
            --border: rgba(255, 255, 255, 0.3);
        }
        
        body { margin: 0; font-family: 'Montserrat', sans-serif; overflow-x: hidden; color: #444; }

        /* FONDO DINÁMICO SOFT */
        .bg-animated {
            position: fixed; inset: 0;
            background: linear-gradient(-45deg, #f3e5f5, #e1f5fe, #ede7f6, #fce4ec);
            background-size: 400% 400%;
            animation: gradientMove 20s ease infinite;
            z-index: -2;
        }
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* CAPA DE BRILLOS */
        .sparkles { position: fixed; inset: 0; background: url('https://www.transparenttextures.com/patterns/stardust.png'); opacity: 0.3; z-index: -1; }

        /* CONTENEDOR TIPO GLASSMORPHISM */
        .container {
            max-width: 1000px; margin: 50px auto; padding: 40px 20px;
            background: var(--glass); backdrop-filter: blur(10px);
            border: 1px solid var(--border); border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05); text-align: center;
        }

        h1 { font-family: 'Dancing Script'; font-size: 4.5rem; color: var(--secondary); margin-bottom: 10px; text-shadow: 2px 2px 5px rgba(0,0,0,0.05); }
        .subtitle { letter-spacing: 5px; font-weight: 300; color: #888; margin-bottom: 40px; }

        /* GALERÍA MEJORADA (ESTILO MASONRY MODERNO) */
        .gallery {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px; padding: 20px;
        }
        .gallery-item {
            position: relative; overflow: hidden; border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: #fff; padding: 10px;
        }
        .gallery-item img { width: 100%; height: 300px; object-fit: cover; border-radius: 15px; }
        .gallery-item:hover { transform: translateY(-10px) scale(1.03); box-shadow: 0 15px 30px rgba(157, 129, 255, 0.3); }

        /* BOTONES ESTÉTICOS */
        .btn-fancy {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white; border: none; padding: 15px 40px; border-radius: 50px;
            font-weight: 700; cursor: pointer; transition: 0.3s;
            box-shadow: 0 8px 20px rgba(157, 129, 255, 0.4); font-size: 1.1rem;
        }
        .btn-fancy:hover { transform: scale(1.1); box-shadow: 0 12px 25px rgba(157, 129, 255, 0.6); }

        .btn-confetti {
            background: transparent; border: 2px solid var(--secondary); color: var(--secondary);
            padding: 10px 25px; border-radius: 20px; margin-top: 20px; cursor: pointer;
            font-weight: 600; transition: 0.3s;
        }
        .btn-confetti:hover { background: var(--secondary); color: white; }

        /* SECCIÓN DE MENSAJE */
        .message-box {
            background: rgba(255, 255, 255, 0.5); padding: 30px; border-radius: 25px;
            margin: 40px auto; max-width: 700px; font-style: italic; line-height: 1.6;
        }

    </style>
</head>
<body>

    <div class="bg-animated"></div>
    <div class="sparkles"></div>

    <div class="container">
        <h1>¡Feliz Cumple, Kate!</h1>
        <p class="subtitle">CELEBRANDO TUS 20 AÑOS</p>
        
        <button class="btn-fancy" onclick="lanzarGranConfeti()">¡SORPRESA! 🎉</button>

        <div class="message-box">
            "Para la mejor cuñis, fan de BTS y una persona increíble. Que este nuevo año de vida esté lleno de música, alegría y sueños cumplidos. ¡A disfrutar tus 20!"
        </div>

        <!-- GALERÍA DISTRIBUIDA -->
        <div class="gallery">
            <div class="gallery-item"><img src="kate1.jpg" alt="Kate"></div>
            <div class="gallery-item"><img src="kate2.jpg" alt="Kate"></div>
            <div class="gallery-item" style="grid-row: span 2;"><img src="kate3.jpg" style="height: 625px;"></div>
            <div class="gallery-item"><img src="kate4.jpg" alt="Kate"></div>
            <div class="gallery-item"><img src="kate5.jpg" alt="Kate"></div>
            <div class="gallery-item"><img src="kate6.jpg" alt="Kate"></div>
        </div>

        <div style="margin-top: 50px;">
            <button class="btn-confetti" onclick="lanzarConfeti()">Más Brillos ✨</button>
        </div>

        <footer style="margin-top: 60px;">
            <a href="ambas.html" style="color: var(--secondary); text-decoration: none; font-weight: 700;">← Volver a Zazita & Kate</a>
        </footer>
    </div>

    <script>
        function lanzarGranConfeti() {
            const duration = 3 * 1000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 7,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#d4a5ff', '#9d81ff', '#ffffff']
                });
                confetti({
                    particleCount: 7,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#d4a5ff', '#9d81ff', '#ffffff']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        function lanzarConfeti() {
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#d4a5ff', '#ffffff']
            });
        }
    </script>
</body>
</html>
