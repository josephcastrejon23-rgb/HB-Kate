<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD Kate! 💜</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --army-purple: #bb86fc; 
            --dark-purple: #1a0033; 
            --bts-gradient: linear-gradient(135deg, #120024 0%, #000000 100%);
            --glow: 0 0 15px rgba(187, 134, 252, 0.6);
        }
        
        body { 
            margin: 0; 
            background: #000; 
            color: white; 
            font-family: 'Montserrat', sans-serif; 
            text-align: center; 
            overflow-x: hidden; 
        }

        /* FONDO DINÁMICO CON ESTRELLAS */
        .bg-kate { 
            position: fixed; 
            inset: 0; 
            background: var(--bts-gradient); 
            z-index: -1; 
        }
        .stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: transparent url('https://www.transparenttextures.com/patterns/stardust.png') repeat;
            z-index: -1; opacity: 0.5;
            animation: twinkle 5s infinite alternate;
        }
        @keyframes twinkle { from { opacity: 0.3; } to { opacity: 0.7; } }
        
        /* PANTALLA DE INICIO */
        #bloqueo-inicial { 
            position: fixed; inset: 0; background: #000; z-index: 50000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }

        /* INTRO CON TRANSICIÓN */
        #intro-k { 
            position: fixed; inset: 0; background: #000; z-index: 1000; 
            display: none; align-items: center; justify-content: center; 
        }
        
        #text-k {
            transition: opacity 0.6s ease-in-out;
            opacity: 0;
            text-shadow: var(--glow);
        }

        .container { 
            padding: 40px 20px; 
            display: none; 
            opacity: 0; 
            transition: opacity 2s ease-in; 
            max-width: 1200px;
            margin: auto;
        }
        
        /* FOTO PRINCIPAL MEJORADA */
        .bts-photo-wrapper { 
            position: relative; 
            width: 220px; 
            height: 220px; 
            margin: 0 auto 30px; 
        }
        .bts-photo { 
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover; 
            border: 4px solid var(--army-purple); 
            box-shadow: 0 0 30px var(--army-purple);
            transition: transform 0.5s ease;
        }
        .bts-photo-wrapper:hover .bts-photo { transform: scale(1.05); }

        /* MURAL DE FOTOS MEJORADO */
        .mural-k { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; 
            margin: 50px auto; 
            padding: 0 20px;
        }
        .mural-k div { 
            position: relative;
            border-radius: 15px; 
            overflow: hidden; 
            border: 2px solid rgba(187, 134, 252, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: #111;
        }
        .mural-k img { 
            width: 100%; 
            height: 300px; 
            object-fit: cover; 
            display: block;
            filter: brightness(0.7) grayscale(30%);
            transition: 0.5s;
        }
        .mural-k div:hover { 
            transform: translateY(-10px); 
            border-color: var(--army-purple); 
            box-shadow: 0 10px 25px rgba(187, 134, 252, 0.4);
        }
        .mural-k div:hover img { 
            filter: brightness(1.1) grayscale(0%);
            transform: scale(1.1);
        }

        .message-box { 
            background: rgba(36, 0, 70, 0.4); 
            padding: 30px; 
            border-radius: 20px; 
            border: 1px solid var(--army-purple);
            max-width: 650px; 
            margin: 40px auto;
            backdrop-filter: blur(10px);
            line-height: 1.6;
            box-shadow: inset 0 0 20px rgba(187, 134, 252, 0.1);
        }

        .btn-k { 
            background: transparent; 
            color: var(--army-purple); 
            border: 2px solid var(--army-purple); 
            padding: 18px 40px; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: bold;
            transition: 0.4s;
            font-family: 'Syncopate', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .btn-k:hover { 
            background: var(--army-purple); 
            color: black; 
            box-shadow: 0 0 30px var(--army-purple);
            transform: translateY(-2px);
        }

        footer a {
            transition: 0.3s;
            border-bottom: 1px solid transparent;
            padding-bottom: 5px;
        }
        footer a:hover {
            color: white !important;
            border-bottom: 1px solid var(--army-purple);
        }

    </style>
</head>
<body>

    <div class="bg-kate"></div>
    <div class="stars"></div>

    <!-- INICIO -->
    <div id="bloqueo-inicial">
        <h2 style="color: var(--army-purple); font-family: 'Syncopate'; margin-bottom: 20px; letter-spacing: 5px;">BTS CHAPTER: KATE</h2>
        <button class="btn-k" onclick="iniciarExperiencia()">BORAHAE 💜</button>
    </div>

    <!-- AUDIO BTS -->
    <audio id="audioBTS" loop preload="auto">
        <source src="Happy Birthday To You - THE KIBOOMERS Birthday Party Song for Kids (1).mp3" type="audio/mpeg">
    </audio>

    <!-- INTRO TEXTOS -->
    <div id="intro-k">
        <h1 id="text-k" style="color:var(--army-purple); font-size: 2.5rem; font-family: 'Syncopate';"></h1>
    </div>

    <!-- CONTENIDO -->
    <div class="container" id="main-k">
        <div class="bts-photo-wrapper">
            <img src="kate_perfil.jpg" class="bts-photo">
        </div>
        
        <h1 style="font-family: 'Syncopate'; font-size: 3rem; margin: 0; letter-spacing: 8px;">KATE</h1>
        <p style="color: var(--army-purple); letter-spacing: 5px; font-weight: 300; margin-top: 10px;">LEVEL 20 UNLOCKED</p>
        
        <div class="message-box">
            <p style="font-size: 1.1rem;">¡Feliiiz cumpleee Kateee! 🎂, que la pases muy bonitooo, felices 20 añitos, sigue con la chispa que te caracteriza, eres una muy buena amiga. ¡Te mereces todo lo mejor hoy y siempre, cuñis! 💜</p>
        </div>

        <div class="mural-k">
            <div><img src="WhatsApp Image 2026-04-29 at 11.21.13 AM (2).jpeg"></div>
            <div><img src="WhatsApp Image 2026-04-29 at 11.21.11 AM (1).jpeg"></div>
            <div><img src="WhatsApp Image 2026-04-29 at 11.21.11 AM.jpeg"></div>
            <div><img src="WhatsApp Image 2026-04-29 at 11.21.13 AM (1).jpeg"></div>
            <div><img src="WhatsApp Image 2026-04-29 at 11.21.15 AM.jpeg"></div>
        </div>

        <div style="margin: 60px 0;">
            <button class="btn-k" onclick="boom()">LANZAR DINAMITA 🧨</button>
        </div>

        <footer style="margin-bottom: 80px;">
            <a href="ambas.html" style="color:var(--army-purple); text-decoration:none; font-size: 0.9rem; font-weight: bold;">Ver mural compartido 👯‍♀️</a>
        </footer>
    </div>

    <script>
        const audio = document.getElementById('audioBTS');
        const intro = document.getElementById('intro-k');
        const main = document.getElementById('main-k');
        const txt = document.getElementById('text-k');

        const frases = [
            "¡Atención ARMY! 💜",
            "Hoy celebramos a una leyenda...",
            "¡Feliz Cumpleaños Kate!",
            "I Purple You 💜"
        ];

        function iniciarExperiencia() {
            document.getElementById('bloqueo-inicial').style.display = 'none';
            intro.style.display = 'flex';
            audio.play();
            mostrarFrases(0);
        }

        function mostrarFrases(index) {
            if (index < frases.length) {
                txt.innerText = frases[index];
                txt.style.opacity = 1;
                setTimeout(() => {
                    txt.style.opacity = 0;
                    setTimeout(() => mostrarFrases(index + 1), 600);
                }, 2000);
            } else {
                intro.style.opacity = 0;
                setTimeout(() => {
                    intro.style.display = 'none';
                    main.style.display = 'block';
                    setTimeout(() => main.style.opacity = 1, 100);
                }, 1000);
            }
        }

        function boom() {
            // Explosión central
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#bb86fc', '#6200ee', '#ffffff', '#240046']
            });
            // Lluvia desde los lados
            setTimeout(() => {
                confetti({
                    particleCount: 50,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 }
                });
                confetti({
                    particleCount: 50,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 }
                });
            }, 200);
        }
    </script>
</body>
</html>
